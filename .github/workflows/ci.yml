name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check:clean
      - run: node --check team_chat_server.cjs
      - run: find assets/js public/assets/js -name '*.js' -print0 | xargs -0 -n1 node --check
      - run: npm run build
      - run: npm audit --omit=dev
      - run: npm audit
