<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TeamChat - AI Agent 协作平台</title>
    
    <link rel="stylesheet" href="/css/variables.css?v=74">
    <link rel="stylesheet" href="/css/base.css?v=74">
    <link rel="stylesheet" href="/css/components.css?v=74">
    <link rel="stylesheet" href="/css/layout.css?v=99">
    <link rel="stylesheet" href="/css/mobile.css?v=74">
    <link rel="stylesheet" href="/css/themes/dark.css?v=74" id="theme-dark">
    <link rel="stylesheet" href="/css/themes/light.css?v=74" id="theme-light" disabled>

    <!-- 预加载压缩后的头像，加速首屏渲染 -->
    <link rel="preload" href="/images/agent-default.png" as="image">
    <link rel="preload" href="/images/agent-default.png" as="image">
    <link rel="preload" href="/images/agent-default.png" as="image">
    <link rel="preload" href="/images/agent-default.png" as="image">
    <link rel="preload" href="/images/compressed/小文2_compressed.jpg" as="image">
</head>
<body data-theme="dark">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <h2>🤖 Agents</h2>
            </header>
            <div class="agent-list" id="agent-list"></div>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="chat-container">
            <header class="chat-header">
                <button class="header-btn" id="menu-toggle">☰</button>
                <div class="header-title">
                    <span id="current-agent-name">TeamChat</span>
                    <span class="connection-status" id="connection-status"></span>
                </div>
                <div class="header-actions">
                    <button class="header-btn" id="search-toggle" title="搜索">🔍</button>
                    <button class="header-btn" id="filter-toggle" title="筛选">🏷️</button>
                    <button class="header-btn" id="status-toggle" title="工作日志">📋</button>
                    <button class="header-btn" id="metrics-toggle" title="性能监控">📈</button>
                    <button class="header-btn" id="email-monitor-toggle" title="邮件监控">📧</button>
                    <button class="header-btn more-toggle" id="more-toggle" title="更多">⋯</button>
                    <div class="header-dropdown" id="header-dropdown">
                        <button class="dropdown-item" id="scroll-lock-toggle-2">
                            <span class="dropdown-icon">🔓</span>
                            <span>锁定滚动</span>
                        </button>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/muse-app/index.html" target="_blank">
                            <span class="dropdown-icon">🧠</span>
                            <span>Muse System</span>
                        </a>
                        <button class="dropdown-item" id="theme-toggle-2">
                            <span class="dropdown-icon">🌙</span>
                            <span>切换主题</span>
                        </button>
                        <a class="dropdown-item" href="/team_chat.html" target="_blank">
                            <span class="dropdown-icon">📜</span>
                            <span>旧版界面</span>
                        </a>
                    </div>
                </div>
            </header>

            <div class="search-container" id="search-container">
                <input type="text" id="search-input" placeholder="搜索消息...">
                <span class="search-info"></span>
                <span class="search-close">✕</span>
            </div>

            <div class="messages-view" id="messages-view"></div>

            <div class="input-area" id="input-area">
                <div class="file-preview" id="file-preview"></div>
                <div class="input-row">
                    <button class="btn-action" id="upload-btn" title="上传文件">📎</button>
                    <textarea id="chat-input" placeholder="输入消息... (@ 提及 Agent)" rows="1"></textarea>
                    <button class="btn-send" id="send-btn">➤</button>
                </div>
                <input type="file" id="file-input" multiple hidden>
            </div>
        </main>

        <div class="filter-panel" id="filter-panel">
            <div class="filter-panel-header">
                <span>筛选消息</span>
                <span class="filter-panel-close">✕</span>
            </div>
            <div class="filter-quick-btns">
                <button class="filter-quick-btn" data-filter="all">全部</button>
                <button class="filter-quick-btn" data-filter="dev">开发组</button>
            </div>
            <div class="filter-agent-grid" id="filter-agent-grid"></div>
        </div>
        <div class="filter-panel-overlay" id="filter-panel-overlay"></div>

        <div class="mention-menu" id="mention-menu"></div>

        <div class="toast-container" id="toast-container"></div>
    </div>

    <script type="module" src="/assets/js/main.js?v=106"></script>
</body>
</html>
