<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body { margin: 0; }
        @media (max-width: 768px) {
            body { background: red; }
        }
        @media (min-width: 769px) {
            body { background: green; }
        }
    </style>
</head>
<body>
    <script>
        document.body.innerHTML = 'Window width: ' + window.innerWidth + 'px';
    </script>
</body>
</html>
