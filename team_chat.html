<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OpenClaw Agent Team Chat</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --bg-dark: #0d1117;
            --panel-dark: #161b22;
            --text-main: #c9d1d9;
            --border-color: #30363d;
            --input-bg: #0d1117;
            --msg-agent-bg: #21262d;
            --msg-user-bg: #238636;
            --cyber-red: #ff4d4d;
            --cyber-blue: #00d4ff;
            --cyber-purple: #bc8cf2;
            --cyber-green: #3fb950;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }
        
        [data-theme="light"] {
            --bg-dark: #ffffff;
            --panel-dark: #f6f8fa;
            --text-main: #24292f;
            --border-color: #d0d7de;
            --input-bg: #ffffff;
            --msg-agent-bg: #f6f8fa;
            --msg-user-bg: #0969da;
            --cyber-red: #cf222e;
            --cyber-blue: #0969da;
            --cyber-purple: #8250df;
            --cyber-green: #1a7f37;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        .sidebar {
            width: 220px;
            background-color: var(--panel-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, background-color 0.3s;
            z-index: 2000;
        }

        /* ===== 移动端UI美化增强 - v2.0 ===== */
        @media (max-width: 768px) {
            :root {
                --sidebar-width: 85vw;
                --header-height: 56px;
                --input-height: 60px;
                --touch-target-min: 44px;
                --safe-top: env(safe-area-inset-top);
                --safe-bottom: env(safe-area-inset-bottom);
                --safe-left: env(safe-area-inset-left);
                --safe-right: env(safe-area-inset-right);
                --radius-mobile: 20px;
                --shadow-mobile: 0 4px 20px rgba(0,0,0,0.15);
                --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
                --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
                --msg-spacing: 12px;
                --msg-font-size: 16px;
                --meta-font-size: 11px;
            }

            * {
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }

            /* 支持减少动画偏好 */
            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                    transition-duration: 0.01ms !important;
                }
            }

            body {
                display: block;
                padding-top: var(--safe-top);
                padding-bottom: var(--safe-bottom);
                padding-left: var(--safe-left);
                padding-right: var(--safe-right);
                overscroll-behavior-y: contain;
                height: 100dvh;
                position: fixed;
                inset: 0;
                overscroll-behavior: none;
                /* 优化字体渲染 */
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
            }
            
            .chat-container {
                height: 100%;
                width: 100%;
                padding-bottom: 0;
            }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 80vw;
                max-width: 300px;
                min-width: 260px;
                box-shadow: 10px 0 40px rgba(0,0,0,0.4);
                z-index: 3000;
                background: rgba(22, 27, 34, 0.98);
                padding-top: var(--safe-top);
                height: 100%;
                height: 100dvh;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                /* 流畅的侧边栏滑入动画 */
                transition: transform 0.35s var(--transition-bounce), box-shadow 0.35s ease;
                will-change: transform;
            }
            .sidebar.active {
                transform: translateX(0);
                box-shadow: 10px 0 50px rgba(0,0,0,0.5);
            }
            
            /* 侧边栏遮罩层 - 优化触摸体验 */
            .sidebar-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0);
                z-index: 2999;
                opacity: 0;
                visibility: hidden;
                transition: background 0.35s ease, opacity 0.35s ease, visibility 0.35s ease;
                backdrop-filter: blur(0px);
                -webkit-backdrop-filter: blur(0px);
            }
            .sidebar-overlay.active {
                background: rgba(0,0,0,0.6);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                opacity: 1;
                visibility: visible;
            }
            
            .team-header {
                padding: 16px 14px;
                padding-top: calc(16px + var(--safe-top));
                font-size: 16px;
                font-weight: 600;
                display: flex;
                align-items: center;
                justify-content: space-between;
                letter-spacing: -0.3px;
                flex-shrink: 0;
                border-bottom: 1px solid var(--border-color);
            }
            
            .team-header span {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            
            .team-header .status-wrap {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            
            .team-header #connection-status {
                position: static;
                width: 10px;
                height: 10px;
                flex-shrink: 0;
                box-shadow: 0 0 10px currentColor;
                animation: pulse-dot 2s ease-in-out infinite;
            }
            
            @keyframes pulse-dot {
                0%, 100% { opacity: 1; transform: scale(1); }
                50% { opacity: 0.7; transform: scale(1.1); }
            }
            
            .messages-view {
                padding: 16px 12px;
                padding-bottom: calc(120px + var(--safe-bottom));
                -webkit-overflow-scrolling: touch;
                scroll-behavior: smooth;
                overscroll-behavior-y: contain;
                contain: layout style paint;
                transform: translateZ(0);
                /* 优化滚动体验 */
                scroll-snap-type: y proximity;
                width: 100%;
                box-sizing: border-box;
            }
            
            .input-area {
                padding: 6px 10px;
                padding-bottom: calc(8px + var(--safe-bottom));
                padding-left: calc(10px + var(--safe-left));
                padding-right: calc(10px + var(--safe-right));
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 200;
                box-shadow: 0 -2px 16px rgba(0,0,0,0.1);
                background: linear-gradient(to top, var(--panel-dark) 0%, rgba(22, 27, 34, 0.98) 100%);
                /* 底部手势条适配 */
                padding-bottom: max(calc(8px + var(--safe-bottom)), 16px);
            }
            
            .msg {
                max-width: 85%;
                min-width: 0;
                margin-left: 0;
                margin-right: 0;
                align-items: flex-start;
                gap: 10px;
                margin-bottom: 8px;
                /* GPU加速 */
                will-change: transform;
                transform: translateZ(0);
                /* 消息入场动画 */
                animation: msgSlideIn 0.35s var(--transition-bounce);
            }
            
            .msg.user {
                align-self: flex-end;
                flex-direction: row-reverse;
                margin-left: auto;
            }
            
            .msg.agent {
                align-self: flex-start;
                margin-right: auto;
            }
            
            @keyframes msgSlideIn {
                from {
                    opacity: 0;
                    transform: translateY(15px) scale(0.96);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            
            .msg-content {
                font-size: 15px;
                padding: 12px 16px;
                line-height: 1.55;
                border-radius: 20px;
                word-break: break-word;
                white-space: pre-wrap;
                overflow-wrap: break-word;
                min-width: 0;
                width: 100%;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                /* 触摸反馈 */
                transition: transform 0.15s ease, box-shadow 0.15s ease;
            }
            
            .msg-content:active {
                transform: scale(0.98);
                box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            }
            
            .msg-content pre {
                white-space: pre-wrap;
                word-break: break-word;
                overflow-x: auto;
                max-width: 100%;
            }
            
            .msg-content code {
                word-break: break-all;
            }
            
            .msg-meta {
                font-size: 11px;
                margin-bottom: 4px;
                opacity: 0.75;
                font-weight: 500;
                letter-spacing: 0.2px;
            }
            
            .msg .agent-avatar {
                width: 36px;
                height: 36px;
                flex-shrink: 0;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                transition: transform 0.2s var(--transition-bounce);
            }
            
            .msg .agent-avatar:active {
                transform: scale(0.92);
            }
            
            .msg.user .msg-content {
                border-bottom-right-radius: 6px;
                background: linear-gradient(145deg, var(--msg-user-bg), rgba(35, 134, 54, 0.92));
                box-shadow: 0 3px 12px rgba(35, 134, 54, 0.25);
            }
            
            .msg.agent .msg-content {
                border-bottom-left-radius: 6px;
                background: linear-gradient(145deg, var(--msg-agent-bg), rgba(33, 38, 45, 0.98));
                box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            }
            
            .agent-list {
                padding: 8px 10px;
                padding-bottom: calc(20px + var(--safe-bottom));
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
                width: 100%;
                box-sizing: border-box;
            }
            
            .agent-item {
                padding: 10px 12px;
                gap: 12px;
                border-radius: 14px;
                min-height: 56px;
                -webkit-tap-highlight-color: transparent;
                display: flex;
                align-items: center;
                background: rgba(127, 127, 127, 0.03);
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.2s var(--transition-smooth);
                margin-bottom: 4px;
                border: 1px solid transparent;
                width: 100%;
                box-sizing: border-box;
            }

            .agent-item:active {
                background-color: rgba(127, 127, 127, 0.12);
                transform: scale(0.98);
                transition-duration: 0.08s;
            }
            
            .agent-item:hover {
                background-color: rgba(127, 127, 127, 0.08);
                border-color: rgba(127, 127, 127, 0.1);
            }
            
            .agent-avatar {
                width: 40px;
                height: 40px;
                flex-shrink: 0;
                box-shadow: 0 3px 10px rgba(0,0,0,0.15);
                border-radius: 50%;
                background-size: cover;
                background-position: center;
            }
            
            .agent-avatar-wrap {
                width: 40px;
                height: 40px;
                flex-shrink: 0;
                position: relative;
            }
            
            #menu-toggle {
                display: flex !important;
                align-items: center;
                justify-content: center;
                width: var(--touch-target-min);
                height: var(--touch-target-min);
                font-size: 22px;
                margin-right: 12px;
                border-radius: 14px;
                -webkit-tap-highlight-color: transparent;
                background: rgba(127, 127, 127, 0.06);
                flex-shrink: 0;
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.2s var(--transition-bounce);
                will-change: transform;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            }

            #menu-toggle:active {
                background-color: rgba(127, 127, 127, 0.2);
                transform: scale(0.88);
                transition-duration: 0.08s;
                box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            }
            
            #menu-toggle:hover {
                background-color: rgba(127, 127, 127, 0.12);
            }
            
            .chat-header {
                padding: 8px 12px;
                padding-top: calc(8px + var(--safe-top));
                padding-left: calc(12px + var(--safe-left));
                padding-right: calc(12px + var(--safe-right));
                min-height: 44px;
                position: sticky;
                top: 0;
                z-index: 100;
                /* 刘海屏适配 */
                padding-top: max(calc(8px + var(--safe-top)), 12px);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }
            
            .chat-header > div:first-child {
                flex: 1;
                min-width: 0;
                overflow: hidden;
            }
            
            #current-channel {
                display: block;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            
            .header-actions {
                gap: 2px;
                display: flex;
                align-items: center;
                flex-shrink: 0;
                margin-left: 4px;
                overflow-x: auto;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            .header-actions::-webkit-scrollbar {
                display: none;
            }

            .header-action {
                padding: 6px 8px;
                border-radius: 10px;
                -webkit-tap-highlight-color: transparent;
                font-size: 11px;
                min-width: 36px;
                min-height: 36px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2px;
                background: rgba(127, 127, 127, 0.06);
                border: 1px solid transparent;
                transition: all 0.2s var(--transition-bounce);
                white-space: nowrap;
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                box-shadow: 0 1px 4px rgba(0,0,0,0.06);
                flex-shrink: 0;
                line-height: 1;
            }

            .header-action span:first-child {
                font-size: 16px;
                line-height: 1;
            }

            .header-action .header-action-text {
                display: block;
                font-size: 9px;
                opacity: 0.8;
            }

            .header-action:active {
                background-color: rgba(127, 127, 127, 0.18);
                transform: scale(0.92);
                transition-duration: 0.08s;
                box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            }
            
            .header-action:hover {
                background-color: rgba(127, 127, 127, 0.12);
            }
            
            .header-action-text {
                display: block;
                font-size: 9px;
            }
            
            #chat-input {
                font-size: 16px; /* 防止iOS自动缩放 */
                padding: 10px 12px;
                height: 48px !important; /* 强制固定高度 */
                min-height: 48px !important;
                max-height: 48px !important;
                border-radius: 12px;
                -webkit-appearance: none;
                appearance: none;
                background: var(--input-bg);
                border: 1px solid transparent;
                outline: none;
                line-height: 1.5;
                transition: border-color 0.2s ease;
                flex: 1;
                min-width: 0;
                width: 100%;
                overflow-y: auto; /* 允许滚动 */
                resize: none;
            }

            #chat-input:focus {
                border-color: rgba(0, 212, 255, 0.4);
            }
            
            .send-btn {
                padding: 10px 20px;
                border-radius: 12px;
                min-width: 64px;
                min-height: 40px;
                font-size: 14px;
                font-weight: 600;
                -webkit-tap-highlight-color: transparent;
                display: flex;
                align-items: center;
                justify-content: center;
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.2s var(--transition-bounce);
                will-change: transform;
                transform: translateZ(0);
                box-shadow: 0 2px 8px rgba(35, 134, 54, 0.25);
                letter-spacing: 0.3px;
                flex-shrink: 0;
            }

            .send-btn:active {
                transform: scale(0.95) translateZ(0);
                filter: brightness(0.92);
                box-shadow: 0 1px 4px rgba(35, 134, 54, 0.2);
                transition-duration: 0.08s;
            }

            .send-btn:hover {
                filter: brightness(1.05);
                box-shadow: 0 3px 12px rgba(35, 134, 54, 0.3);
            }

            .action-btn {
                padding: 6px;
                min-width: 32px;
                min-height: 32px;
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-tap-highlight-color: transparent;
                font-size: 16px;
                border-radius: 8px;
                background: rgba(127, 127, 127, 0.06);
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.2s var(--transition-bounce);
                will-change: transform;
                box-shadow: 0 1px 4px rgba(0,0,0,0.05);
                flex-shrink: 0;
            }

            .action-btn:active {
                background-color: rgba(127, 127, 127, 0.18);
                transform: scale(0.92);
                transition-duration: 0.08s;
                box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            }

            .action-btn:hover {
                background-color: rgba(127, 127, 127, 0.12);
            }
            
            .input-wrapper {
                border-radius: 16px;
                padding: 6px 10px;
                gap: 8px;
                background: var(--input-bg);
                border: 1px solid var(--border-color);
                align-items: flex-end;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
                display: flex;
                flex-direction: column;
                width: 100%;
            }

            .input-row {
                display: flex;
                align-items: flex-end;
                gap: 8px;
                width: 100%;
            }

            .input-actions-row {
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                padding: 4px 0 0 0;
                border-top: 1px solid rgba(127, 127, 127, 0.1);
                margin-top: 4px;
            }
            
            .input-wrapper:focus-within {
                border-color: rgba(0, 212, 255, 0.3);
            }
            
            .mention-menu {
                left: 12px;
                right: 12px;
                width: auto;
                border-radius: 20px;
                max-height: 320px;
                box-shadow: 0 -12px 40px rgba(0,0,0,0.35);
                background: rgba(22, 27, 34, 0.98);
                border: 1px solid rgba(127, 127, 127, 0.15);
                /* 流畅的弹出动画 */
                animation: menuSlideUp 0.3s var(--transition-bounce);
                transform-origin: bottom center;
            }
            
            @keyframes menuSlideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px) scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            
            .mention-item {
                padding: 14px 18px;
                min-height: var(--touch-target-min);
                font-size: 15px;
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.15s ease;
                border-bottom: 1px solid rgba(127, 127, 127, 0.08);
            }

            .mention-item:active {
                background-color: rgba(127, 127, 127, 0.15);
                transform: scale(0.98);
            }
            
            .mention-item:first-child {
                border-radius: 20px 20px 0 0;
            }
            
            .mention-item:last-child {
                border-radius: 0 0 20px 20px;
                border-bottom: none;
            }
            
            .file-card {
                padding: 12px 14px;
                border-radius: 16px;
                min-height: var(--touch-target-min);
                max-width: 100%;
                gap: 12px;
                touch-action: manipulation;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                transition: all 0.2s var(--transition-smooth);
                background: rgba(127, 127, 127, 0.05);
                border: 1px solid rgba(127, 127, 127, 0.1);
            }

            .file-card:active {
                background-color: rgba(127, 127, 127, 0.12);
                transform: scale(0.98);
                border-color: rgba(127, 127, 127, 0.15);
            }
            
            .file-badge {
                width: 44px;
                height: 44px;
                border-radius: 12px;
                font-size: 11px;
                font-weight: 700;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            }
            
            .file-thumb {
                width: 44px;
                height: 44px;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            }
            
            .file-name {
                font-size: 14px;
                font-weight: 500;
            }
            
            .file-hint {
                font-size: 11px;
                opacity: 0.7;
            }
            
            /* 隐藏桌面端元素 */
            .desktop-only {
                display: none !important;
            }
            
            /* 更好的滚动指示 */
            .messages-view::before {
                content: '';
                position: sticky;
                display: block;
                top: 0;
                left: 0;
                right: 0;
                height: 20px;
                background: linear-gradient(to bottom, var(--bg-dark), transparent);
                margin-bottom: -20px;
                z-index: 10;
                pointer-events: none;
            }
            
            /* 移动端筛选面板优化 */
            .filter-panel {
                position: fixed;
                top: auto;
                bottom: calc(var(--input-height) + 12px);
                left: 12px;
                right: 12px;
                background: rgba(22, 27, 34, 0.98);
                border: 1px solid rgba(127, 127, 127, 0.15);
                border-radius: 24px;
                box-shadow: 0 -12px 40px rgba(0,0,0,0.35);
                z-index: 150;
                max-height: 0;
                padding: 0;
                overflow: hidden;
                transition: all 0.35s var(--transition-bounce);
                transform-origin: bottom center;
            }
            
            .filter-panel.show {
                max-height: 65vh;
                padding: 18px 20px;
                animation: filterPanelSlideUp 0.35s var(--transition-bounce);
            }
            
            @keyframes filterPanelSlideUp {
                from {
                    opacity: 0;

    </div>

    <script>
        const agents = [
            { id: 'lobster', agentId: 'main', name: '小龙虾', role: '总助 / COO', color: 'var(--cyber-red)', img: '小龙虾.png' },
            { id: 'dev', agentId: 'dev', name: '小码', role: '开发主管', color: 'var(--cyber-purple)', img: '小码.png' },
            { id: 'pm', agentId: 'pm', name: '小产', role: '产品经理', color: '#ff6b6b', img: '小产.png' },
            { id: 'frontend', agentId: 'frontend', name: '小前', role: '前端开发', color: '#61affe', img: '小前.png' },
            { id: 'backend', agentId: 'backend', name: '小后', role: '后端开发', color: '#49cc90', img: '小后.png' },
            { id: 'devops', agentId: 'devops', name: '小运', role: '运维部署', color: '#fca130', img: '小运.png' },
            { id: 'qa', agentId: 'qa', name: '小测', role: '测试验证', color: '#9012fe', img: '小测.png' },
            { id: 'mobile', agentId: 'mobile', name: '小移', role: '移动端', color: '#0db7ed', img: '小移.png' },

            { id: 'writer', agentId: 'writer', name: '小文', role: '创意策划', color: '#f778ba', img: '小文2.png' },

            { id: 'finance', agentId: 'finance', name: '小财', role: '财经投资', color: '#3fb950', img: '小财.png' }
        ];

        const IMAGE_PATH = 'images/';
        const IS_REMOTE = !['localhost', '127.0.0.1', ''].includes(window.location.hostname);
        
        // ===== 头像缓存系统 =====
        const AVATAR_CACHE_KEY = 'team_chat_avatar_cache';
        const AVATAR_CACHE_VERSION = 'v1'; // 版本控制，更新头像时修改此值
        
        // 头像缓存管理器
        const AvatarCache = {
            cache: new Map(),
            loading: new Set(),
            
            // 初始化缓存
            init() {
                try {
                    const saved = localStorage.getItem(AVATAR_CACHE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        // 检查版本，版本不匹配则清空缓存
                        if (data.version === AVATAR_CACHE_VERSION) {
                            this.cache = new Map(Object.entries(data.avatars || {}));
                        } else {
                            this.clear();
                        }
                    }
                } catch (e) {
                    console.warn('[AvatarCache] Failed to load cache:', e);
                }
            },
            
            // 保存缓存到localStorage
            save() {
                try {
                    const data = {
                        version: AVATAR_CACHE_VERSION,
                        avatars: Object.fromEntries(this.cache),
                        timestamp: Date.now()
                    };
                    localStorage.setItem(AVATAR_CACHE_KEY, JSON.stringify(data));
                } catch (e) {
                    // localStorage 满了，清理旧缓存
                    if (e.name === 'QuotaExceededError') {
                        this.clear();
                    }
                }
            },
            
            // 获取缓存的头像
            get(filename) {
                return this.cache.get(filename) || null;
            },
            
            // 设置缓存
            set(filename, base64Data) {
                this.cache.set(filename, base64Data);
                this.save();
            },
            
            // 清空缓存
            clear() {
                this.cache.clear();
                localStorage.removeItem(AVATAR_CACHE_KEY);
            },
            
            // 获取头像URL（优先使用缓存）
            getUrl(filename) {
                const cached = this.get(filename);
                if (cached) {
                    return cached;
                }
                // 没有缓存时返回原始路径，并触发后台加载
                this.preload(filename);
                return `${IMAGE_PATH}${filename}`;
            },
            
            // 预加载单个头像
            async preload(filename) {
                if (this.cache.has(filename) || this.loading.has(filename)) {
                    return;
                }
                this.loading.add(filename);
                
                try {
                    const response = await fetch(`${IMAGE_PATH}${filename}`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const blob = await response.blob();
                    const base64 = await this.blobToBase64(blob);
                    
                    this.set(filename, base64);
                    this.updateAvatarInDOM(filename, base64);
                } catch (e) {
                    console.warn(`[AvatarCache] Failed to preload ${filename}:`, e);
                } finally {
                    this.loading.delete(filename);
                }
            },
            
            // Blob转Base64
            blobToBase64(blob) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            },
            
            // 更新DOM中的头像
            updateAvatarInDOM(filename, base64) {
                // 更新所有使用该头像的元素
                const selector = `[style*="${IMAGE_PATH}${filename}"], [style*="${filename}"]`;
                document.querySelectorAll(selector).forEach(el => {
                    const currentStyle = el.style.backgroundImage;
                    if (currentStyle.includes(filename)) {
                        el.style.backgroundImage = `url('${base64}')`;
                    }
                });
                
                // 更新img标签
                document.querySelectorAll(`img[src*="${filename}"]`).forEach(img => {
                    img.src = base64;
                });
            },
            
            // 预加载所有Agent头像
            preloadAll() {
                agents.forEach(agent => {
                    this.preload(agent.img);
                });
            }
        };
        
        // 初始化头像缓存
        AvatarCache.init();
        
        // ===== Session 管理 =====
        const SESSION_KEY = 'team_chat_session';
        let sessionToken = localStorage.getItem(SESSION_KEY) || '';
        
        function getSessionToken() {
            return localStorage.getItem(SESSION_KEY) || '';
        }
        
        function setSessionToken(token) {
            sessionToken = token;
            if (token) {
                localStorage.setItem(SESSION_KEY, token);
            } else {
                localStorage.removeItem(SESSION_KEY);
            }
        }
        
        async function checkAuthStatus() {
            try {
                const res = await fetch('/api/check-auth', {
                    headers: { 'X-Session-Token': getSessionToken() }
                });
                const data = await res.json();
                return data.authenticated;
            } catch (e) {
                console.error('Auth check failed:', e);
                return false;
            }
        }
        
        async function login(password) {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.ok && data.session) {
                    setSessionToken(data.session);
                    return true;
                }
                return false;
            } catch (e) {
                console.error('Login failed:', e);
                return false;
            }
        }
        
        function logout() {
            setSessionToken('');
            fetch('/api/logout', { method: 'POST' }).catch(() => {});
            window.location.reload();
        }
        
        const WS_PROTOCOL = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const GATEWAY_URL = `${WS_PROTOCOL}//${window.location.host}/v1/gateway`;
        const MAIN_KEY = 'main';
        let AUTH_TOKEN = null; // 动态从服务器获取
        
        // 启动时获取 Gateway Token
        async function initAuthToken() {
            try {
                const res = await fetch('/api/gateway-token');
                const data = await res.json();
                AUTH_TOKEN = data.token;
                console.log('✅ Gateway token loaded');
            } catch (e) {
                console.error('❌ Failed to load gateway token:', e);
            }
        }
        
        // Use fixed client ID for gateway compatibility
        // Gateway requires specific client ID format - must be 'claw'
        const CLIENT_ID = 'cli';
        
        const FILE_BASE_URL = window.location.origin;

        let ws = null;
        let isConnected = false;
        let connectReqId = null;
        let syncTimer = null;
        let pingTimer = null;
        
        // ===== Phase 1: WebSocket 稳定性增强 =====
        let reconnectAttempts = 0;
        const RECONNECT_BASE_DELAY = 1000; // 1s
        const RECONNECT_MAX_DELAY = 30000; // 30s
        let reconnectTimer = null;
        let isManualClose = false;
        let wasOffline = false;
        
        const HEARTBEAT_INTERVAL = 10000;
        const HEARTBEAT_TIMEOUT = 30000;
        let missedHeartbeats = 0;
        const MAX_MISSED_HEARTBEATS = 3;
        let lastPongTime = Date.now();
        let connectionQuality = 'good';
        
        // 消息队列持久化
        const MESSAGE_QUEUE_KEY = 'team_chat_message_queue';
        
        function getMessageQueue() {
            try {
                const q = localStorage.getItem(MESSAGE_QUEUE_KEY);
                return q ? JSON.parse(q) : [];
            } catch { return []; }
        }
        
        function saveMessageQueue(queue) {
            try {
                localStorage.setItem(MESSAGE_QUEUE_KEY, JSON.stringify(queue.slice(-50)));
            } catch {}
        }
        
        function addToMessageQueue(msg) {
            const q = getMessageQueue();
            q.push({ ...msg, queuedAt: Date.now() });
            saveMessageQueue(q);
        }
        
        function clearMessageQueue() {
            localStorage.removeItem(MESSAGE_QUEUE_KEY);
        }
        
        function flushMessageQueue() {
            const q = getMessageQueue();
            if (!q.length || !isConnected) return;
            const valid = q.filter(m => Date.now() - m.queuedAt < 60000); // 1分钟内有效
            // 清空队列，避免重连时重复发送
            clearMessageQueue();
            if (valid.length === 0) return;
            
            // 逐条发送排队的消息
            valid.forEach(msg => {
                sendToAgentNow(msg.agentId, msg.message);
            });
        }
        
        // 网络状态监听
        function initNetworkMonitor() {
            // Network Status API
            if (navigator.connection) {
                navigator.connection.addEventListener('change', handleNetworkChange);
            }
            // 后台/前台切换
            document.addEventListener('visibilitychange', handleVisibilityChange);
            // 在线/离线事件
            window.addEventListener('online', handleNetworkOnline);
            window.addEventListener('offline', handleNetworkOffline);
        }
        
        function handleNetworkChange() {
            const conn = navigator.connection;
            const isOnline = conn ? conn.downlink !== undefined : navigator.onLine;
            updateConnectionStatus(isOnline);
        }
        
        function handleVisibilityChange() {
            if (document.hidden) {
                console.log('[WS] App went to background');
            } else {
                console.log('[WS] App came to foreground');
                // 切回前台时检查连接
                if (!isConnected && !reconnectTimer) {
                    reconnectAttempts = 0;
                    connect();
                }
            }
        }
        
        function handleNetworkOnline() {
            console.log('[WS] Network online');
            wasOffline = true;
            updateConnectionStatus(true);
            if (!isConnected) {
                reconnectAttempts = 0;
                connect();
            }
        }
        
        function handleNetworkOffline() {
            console.log('[WS] Network offline');
            wasOffline = true;
            updateConnectionStatus(false);
        }
        
        function updateConnectionStatus(isOnline) {
            const statusEl = document.getElementById('connection-status');
            const banner = document.getElementById('connection-banner');
            
            if (!isOnline) {
                if (statusEl) {
                    statusEl.style.backgroundColor = 'red';
                    statusEl.title = '网络已断开';
                }
                if (banner) {
                    banner.style.display = 'block';
                    banner.textContent = '⚠️ 网络已断开，请检查网络设置';
                }
            } else {
                if (statusEl) {
                    statusEl.style.backgroundColor = isConnected ? 'var(--cyber-green)' : 'yellow';
                    statusEl.title = isConnected ? '已连接' : '连接中...';
                }
                if (banner) {
                    if (isConnected) {
                        banner.style.display = 'none';
                    } else {
                        banner.style.display = 'block';
                        banner.textContent = '⚠️ 连接不稳定，正在尝试重连...';
                    }
                }
            }
        }
        
        // Phase 2: 连接质量更新
        function updateConnectionQuality(quality) {
            connectionQuality = quality;
            const statusEl = document.getElementById('connection-status');
            if (statusEl) {
                switch (quality) {
                    case 'good':
                        statusEl.style.backgroundColor = 'var(--cyber-green)';
                        statusEl.style.boxShadow = '0 0 8px var(--cyber-green)';
                        statusEl.title = '连接良好';
                        break;
                    case 'poor':
                        statusEl.style.backgroundColor = 'orange';
                        statusEl.style.boxShadow = '0 0 8px orange';
                        statusEl.title = '连接不稳定';
                        break;
                    case 'disconnected':
                        statusEl.style.backgroundColor = 'red';
                        statusEl.style.boxShadow = '0 0 8px red';
                        statusEl.title = '已断开';
                        break;
                }
            }
        }
        
        // 指数退避重连
        function scheduleReconnect() {
            if (isManualClose) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            
            const delay = Math.min(
                RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts),
                RECONNECT_MAX_DELAY
            );
            reconnectAttempts++;
            
            console.log(`[WS] Scheduling reconnect in ${delay}ms (attempt ${reconnectAttempts})`);
            showStatus(`网络不稳定，${Math.ceil(delay/1000)}秒后重连...`, 'info');
            
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connect();
            }, delay);
        }
        
        function cancelReconnect() {
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
            reconnectAttempts = 0;
        }
        // ===== Phase 1 结束 =====

        const agentPresenceEls = new Map();
        const runMessageEls = new Map(); 
        let greeted = false;
        let messageHistory = [];
        const agentQueues = new Map();
        const agentActiveRuns = new Map();
        const agentPendingTimers = new Map();
        let lastSpeaker = null; // 记录上一个回复的 Agent，用于默认 @
        let filterAgents = new Set(); // 筛选的Agent集合，空表示显示全部
        
        // Agent 工作日志数据结构
        const agentLogs = new Map(); // agentId -> [{timestamp, text, type}]
        const MAX_LOGS_PER_AGENT = 50; // 每个 Agent 保留最近 50 条日志
        const expandedAgents = new Set(); // 记录展开状态的 Agent

        const agentListEl = document.getElementById('agent-list');
        const messagesViewEl = document.getElementById('messages-view');
        const chatInputEl = document.getElementById('chat-input');
        const sendBtnEl = document.getElementById('send-btn');
        const mentionMenuEl = document.getElementById('mention-menu');
        const statusDotEl = document.getElementById('connection-status');

        // ===== 性能监控日志 =====
        const PerfMonitor = {
            enabled: true,
            logs: [],
            maxLogs: 100,
            
            log(action, duration, details = '') {
                if (!this.enabled) return;
                const entry = {
                    time: new Date().toISOString(),
                    action,
                    duration: duration ? `${duration.toFixed(2)}ms` : '-',
                    details
                };
                this.logs.push(entry);
                if (this.logs.length > this.maxLogs) this.logs.shift();
                
                // 性能警告：超过阈值时输出
                if (duration && duration > 100) {
                    console.warn(`[Perf] ${action} took ${duration.toFixed(2)}ms ${details}`);
                }
            },
            
            time(label) {
                return performance.now();
            },
            
            timeEnd(label, start) {
                const duration = performance.now() - start;
                this.log(label, duration);
                return duration;
            },
            
            getReport() {
                const slow = this.logs.filter(l => parseFloat(l.duration) > 50);
                return {
                    total: this.logs.length,
                    slow: slow.length,
                    slowActions: slow.map(l => `${l.action}: ${l.duration}`)
                };
            }
        };

        function generateId() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return Math.random().toString(36).slice(2) + Date.now().toString(36);
        }

        // ===== Toast 消息系统优化 =====
        const ToastSystem = {
            queue: [],
            showing: false,
            lastMessage: '',
            lastTime: 0,
            COOLDOWN: 2000, // 相同消息冷却时间 2秒
            MAX_QUEUE: 3,   // 最多显示3条排队消息
            
            // 显示Toast
            show(msg, type = 'info') {
                const now = Date.now();
                
                // 频率限制：相同消息在冷却时间内不重复显示
                if (msg === this.lastMessage && now - this.lastTime < this.COOLDOWN) {
                    return;
                }
                
                // 合并相似消息
                if (msg.includes('忙碌中') || msg.includes('已排队')) {
                    const existingToast = document.querySelector('.queue-toast');
                    if (existingToast) {
                        // 更新现有toast而不是创建新的
                        return;
                    }
                }
                
                this.lastMessage = msg;
                this.lastTime = now;
                
                // 创建Toast元素
                const statusEl = document.createElement('div');
                statusEl.className = 'status-toast';
                statusEl.style.cssText = `
                    position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
                    padding: 12px 24px; border-radius: 24px; font-size: 14px; z-index: 9999;
                    background: ${type === 'error' ? 'var(--cyber-red)' : type === 'success' ? 'var(--cyber-green)' : 'var(--panel-dark)'};
                    color: white; border: 1px solid var(--border-color);
                    box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none;
                    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                    opacity: 0; transform: translateX(-50%) translateY(-10px);
                    -webkit-backdrop-filter: blur(10px);
                    backdrop-filter: blur(10px);
                    max-width: 90vw;
                    text-align: center;
                `;
                statusEl.textContent = msg;
                document.body.appendChild(statusEl);
                
                // Animate in
                requestAnimationFrame(() => {
                    statusEl.style.opacity = '1';
                    statusEl.style.transform = 'translateX(-50%) translateY(0)';
                });
                
                // Auto dismiss
                const duration = type === 'error' ? 4000 : 2500;
                setTimeout(() => {
                    statusEl.style.opacity = '0';
                    statusEl.style.transform = 'translateX(-50%) translateY(-10px)';
                    setTimeout(() => statusEl.remove(), 300);
                }, duration);
            }
        };

        function showStatus(msg, type = 'info') {
            ToastSystem.show(msg, type);
        }
        
        // ===== 搜索功能 =====
        let searchQuery = '';
        let searchMatches = [];
        let currentMatchIndex = -1;
        let originalMessageContents = new Map(); // 保存原始消息内容
        
        function toggleSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            if (container.classList.contains('active')) {
                closeSearch();
            } else {
                container.classList.add('active');
                input.focus();
            }
        }
        
        function closeSearch() {
            const container = document.getElementById('search-container');
            const input = document.getElementById('search-input');
            const nav = document.getElementById('search-nav');
            
            container.classList.remove('active');
            input.value = '';
            nav.classList.remove('active');
            
            // 清除高亮
            clearSearchHighlights();
            searchQuery = '';
            searchMatches = [];
            currentMatchIndex = -1;
        }
        
        // 搜索防抖
        let searchDebounceTimer = null;
        function debounceSearch(query) {
            if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                handleSearch(query);
                searchDebounceTimer = null;
            }, 300); // 300ms防抖
        }
        
        function handleSearch(query) {
            searchQuery = query.trim().toLowerCase();
            clearSearchHighlights();
            
            if (!searchQuery) {
                document.getElementById('search-nav').classList.remove('active');
                return;
            }
            
            // 使用requestAnimationFrame避免阻塞UI
            requestAnimationFrame(() => {
                searchMatches = [];
                const messages = messagesViewEl.querySelectorAll('.msg');
                
                // 限制搜索范围，只搜索最近100条消息
                const recentMessages = Array.from(messages).slice(-100);
                
                recentMessages.forEach((msgEl, index) => {
                    const contentEl = msgEl.querySelector('.msg-content');
                    if (!contentEl) return;
                    
                    // 保存原始内容
                    if (!originalMessageContents.has(msgEl)) {
                        originalMessageContents.set(msgEl, contentEl.innerHTML);
                    }
                    
                    const text = contentEl.textContent.toLowerCase();
                    if (text.includes(searchQuery)) {
                        searchMatches.push({ el: msgEl, contentEl, index });
                        highlightText(contentEl, searchQuery);
                    }
                });
                
                // 更新搜索导航
                const nav = document.getElementById('search-nav');
                const countEl = document.getElementById('search-count');
                const indexEl = document.getElementById('search-index');
                
                if (searchMatches.length > 0) {
                    nav.classList.add('active');
                    countEl.textContent = `${searchMatches.length} 条结果`;
                    currentMatchIndex = 0;
                    scrollToMatch(0);
                    updateSearchIndex();
                } else {
                    nav.classList.remove('active');
                }
            });
        }
        
        function highlightText(element, query) {
            const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            
            while (walker.nextNode()) {
                textNodes.push(walker.currentNode);
            }
            
            textNodes.forEach(node => {
                const text = node.textContent;
                const lowerText = text.toLowerCase();
                const index = lowerText.indexOf(query);
                
                if (index !== -1) {
                    const before = text.substring(0, index);
                    const match = text.substring(index, index + query.length);
                    const after = text.substring(index + query.length);
                    
                    const span = document.createElement('span');
                    span.className = 'search-highlight';
                    span.textContent = match;
                    
                    const fragment = document.createDocumentFragment();
                    if (before) fragment.appendChild(document.createTextNode(before));
                    fragment.appendChild(span);
                    if (after) fragment.appendChild(document.createTextNode(after));
                    
                    node.parentNode.replaceChild(fragment, node);
                }
            });
        }
        
        function clearSearchHighlights() {
            originalMessageContents.forEach((originalHTML, msgEl) => {
                // 检查元素是否仍在DOM中
                if (msgEl && msgEl.parentNode) {
                    const contentEl = msgEl.querySelector('.msg-content');
                    if (contentEl) {
                        contentEl.innerHTML = originalHTML;
                    }
                }
            });
            originalMessageContents.clear();
        }
        
        // 定期清理搜索缓存，防止内存泄漏
        setInterval(() => {
            if (originalMessageContents.size > 100) {
                // 只保留最近50条
                const entries = Array.from(originalMessageContents.entries());
                originalMessageContents.clear();
                entries.slice(-50).forEach(([k, v]) => originalMessageContents.set(k, v));
            }
        }, 30000);
        
        function searchNext() {
            if (searchMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex + 1) % searchMatches.length;
            scrollToMatch(currentMatchIndex);
            updateSearchIndex();
        }
        
        function searchPrev() {
            if (searchMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length;
            scrollToMatch(currentMatchIndex);
            updateSearchIndex();
        }
        
        function scrollToMatch(index) {
            if (index < 0 || index >= searchMatches.length) return;
            
            // 移除之前的高亮
            document.querySelectorAll('.search-match').forEach(el => {
                el.classList.remove('search-match');

                highlight.classList.add('search-match');

        // ===== 消息编辑/删除功能 =====
        const UNDO_DELETE_TIMEOUT = 5000; // 5秒内可撤回删除
        const deletedMessagesCache = new Map(); // 暂存已删除消息，用于撤回
        
        // 开始编辑消息
        function startEditMessage(btn) {
            const msgEl = btn.closest('.msg');
            if (!msgEl) return;
            
            msgEl.classList.add('editing');
            const input = msgEl.querySelector('.msg-edit-input');
            if (input) {
                input.focus();
                input.setSelectionRange(input.value.length, input.value.length);
            }
        }
        
        // 取消编辑消息
        function cancelEditMessage(btn) {
            const msgEl = btn.closest('.msg');
            if (!msgEl) return;
            
            msgEl.classList.remove('editing');
            // 恢复原始内容
            const input = msgEl.querySelector('.msg-edit-input');
            const timestamp = parseInt(msgEl.dataset.timestamp);
            const msg = messageHistory.find(m => m.timestamp === timestamp);
            if (input && msg) {
                input.value = msg.text || '';
            }
        }
        
        // 保存编辑消息
        async function saveEditMessage(btn) {
            const msgEl = btn.closest('.msg');
            if (!msgEl) return;
            
            const input = msgEl.querySelector('.msg-edit-input');
            if (!input) return;
            
            const newText = input.value.trim();
            if (!newText) {
                showStatus('消息内容不能为空', 'error');
                return;
            }
            
            const timestamp = parseInt(msgEl.dataset.timestamp);
            const msg = messageHistory.find(m => m.timestamp === timestamp);
            
            if (!msg) {
                showStatus('找不到原消息', 'error');
                return;
            }
            
            // 检查内容是否有变化
            if (msg.text === newText) {
                msgEl.classList.remove('editing');
                return;
            }
            
            // 更新本地历史
            const oldText = msg.text;
            msg.text = newText;
            msg.edited = true;
            msg.editHistory = msg.editHistory || [];
            msg.editHistory.push({
                text: oldText,
                editedAt: Date.now()
            });
            
            // 更新DOM
            const contentEl = msgEl.querySelector('.msg-content');
            if (contentEl) {
                contentEl.innerHTML = renderMarkdown(newText) + `<span class="msg-edited-badge">(已编辑)</span>`;
            }
            
            msgEl.classList.remove('editing');
            
            // 保存到本地存储
            saveHistory();
            
            // 同步到服务器
            try {
                await fetch(`${window.location.origin}/history?token=${AUTH_TOKEN}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: timestamp,
                        updates: { text: newText, edited: true }
                    })
                });
                showStatus('消息已编辑', 'success');
            } catch (e) {
                console.error('Failed to sync edit to server:', e);
                showStatus('编辑已保存（本地）', 'info');
            }
        }
        
        // 确认删除消息
        function confirmDeleteMessage(btn) {
            const msgEl = btn.closest('.msg');
            if (!msgEl) return;
            
            if (confirm('确定要删除这条消息吗？\n\n删除后5秒内可撤回。')) {
                deleteMessage(msgEl);
            }
        }
        
        // 删除消息
        async function deleteMessage(msgEl) {
            const timestamp = parseInt(msgEl.dataset.timestamp);
            const msg = messageHistory.find(m => m.timestamp === timestamp);
            
            if (!msg) {
                showStatus('找不到原消息', 'error');
                return;
            }
            
            // 缓存原消息用于撤回
            deletedMessagesCache.set(timestamp, {
                ...msg,
                deletedAt: Date.now()
            });
            
            // 更新本地历史
            msg.deleted = true;
            
            // 更新DOM
            msgEl.classList.add('deleted');
            const contentEl = msgEl.querySelector('.msg-content');
            if (contentEl) {
                contentEl.innerHTML = `<div class="msg-deleted-text">🗑️ 消息已删除 <span class="msg-undo-btn" onclick="undoDeleteMessage(this)">撤回删除</span></div>`;
            }
            
            // 隐藏操作按钮
            const actionsEl = msgEl.querySelector('.msg-actions');
            if (actionsEl) {
                actionsEl.style.display = 'none';
            }
            
            // 保存到本地存储
            saveHistory();
            
            // 同步到服务器
            try {
                await fetch(`${window.location.origin}/history?token=${AUTH_TOKEN}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: timestamp,
                        updates: { deleted: true }
                    })
                });
                showStatus('消息已删除（5秒内可撤回）', 'success');
            } catch (e) {
                console.error('Failed to sync delete to server:', e);
                showStatus('删除已保存（本地）', 'info');
            }
            
            // 5秒后清理缓存
            setTimeout(() => {
                deletedMessagesCache.delete(timestamp);
            }, UNDO_DELETE_TIMEOUT);
        }
        
        // 撤回删除
        async function undoDeleteMessage(btn) {
            const msgEl = btn.closest('.msg');
            if (!msgEl) return;
            
            const timestamp = parseInt(msgEl.dataset.timestamp);
            const cachedMsg = deletedMessagesCache.get(timestamp);
            const msg = messageHistory.find(m => m.timestamp === timestamp);
            
            if (!msg) {
                showStatus('找不到原消息', 'error');
                return;
            }
            
            if (!cachedMsg && !msg.text) {
                showStatus('撤回时间已过', 'error');
                return;
            }
            
            // 恢复消息
            msg.deleted = false;
            if (cachedMsg) {
                msg.text = cachedMsg.text;
            }
            
            // 更新DOM
            msgEl.classList.remove('deleted');
            const contentEl = msgEl.querySelector('.msg-content');
            if (contentEl && msg.text) {
                let html = renderMarkdown(msg.text);
                if (msg.edited) {
                    html += `<span class="msg-edited-badge">(已编辑)</span>`;
                }
                contentEl.innerHTML = html;
            }
            
            // 显示操作按钮
            const actionsEl = msgEl.querySelector('.msg-actions');
            if (actionsEl) {
                actionsEl.style.display = '';
            }
            
            // 清理缓存
            deletedMessagesCache.delete(timestamp);
            
            // 保存到本地存储
            saveHistory();
            
            // 同步到服务器
            try {
                await fetch(`${window.location.origin}/history?token=${AUTH_TOKEN}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: timestamp,
                        updates: { deleted: false }
                    })
                });
                showStatus('已撤回删除', 'success');
            } catch (e) {
                console.error('Failed to sync undo delete to server:', e);
                showStatus('撤回已保存（本地）', 'info');
            }
        }

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('active');
            if (overlay) overlay.classList.toggle('active');
            // 防止背景滚动
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }

        function setupMobileHandlers() {
            // 点击消息区域自动关闭侧边栏
            messagesViewEl.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    document.querySelector('.sidebar').classList.remove('active');
                    const overlay = document.querySelector('.sidebar-overlay');
                    if (overlay) overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });

            // 键盘弹出时调整视图 - 使用Visual Viewport API
            if (window.visualViewport) {
                let viewportResizeTimer = null;
                window.visualViewport.addEventListener('resize', () => {
                    // 防抖处理，避免频繁触发
                    if (viewportResizeTimer) clearTimeout(viewportResizeTimer);
                    viewportResizeTimer = setTimeout(() => {
                        if (window.innerWidth <= 768) {
                            const activeElement = document.activeElement;
                            if (activeElement === chatInputEl) {
                                // 键盘处理 - 不再移动输入框位置，只调整消息区域padding
                                const inputArea = document.querySelector('.input-area');
                                if (inputArea) {
                                    const viewportHeight = window.visualViewport.height;
                                    const windowHeight = window.innerHeight;
                                    const keyboardHeight = windowHeight - viewportHeight;

                                    if (keyboardHeight > 100) {
                                        // 键盘弹出 - 只调整padding，不移动位置
                                        messagesViewEl.style.paddingBottom = `calc(140px + ${keyboardHeight}px)`;
                                    } else {
                                        // 键盘收起
                                        messagesViewEl.style.paddingBottom = '';
                                    }
                                }

                                requestAnimationFrame(() => {
                                    messagesViewEl.scrollTop = messagesViewEl.scrollHeight;
                                });
                            }
                        }
                    }, 100); // 100ms防抖
                });
            } else {
                // 回退到resize事件
                window.addEventListener('resize', () => {
                    if (window.innerWidth <= 768) {
                        const activeElement = document.activeElement;
                        if (activeElement === chatInputEl) {
                            setTimeout(() => {
                                messagesViewEl.scrollTop = messagesViewEl.scrollHeight;
                            }, 300);
                        }
                    }
                });
            }

            // 防止移动端触摸穿透 - 优化：使用CSS替代JS阻止滚动
            // 当侧边栏打开时，给body添加no-scroll类，而不是在JS中阻止默认行为
            const sidebarObserver = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.target.classList.contains('active')) {
                        document.body.style.overflow = 'hidden';
                    } else {
                        document.body.style.overflow = '';
                    }
                });
            });
            
            const sidebarEl = document.querySelector('.sidebar');
            if (sidebarEl) {
                sidebarObserver.observe(sidebarEl, { attributes: true, attributeFilter: ['class'] });
            }

            // 防止双击缩放
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // iOS Safari 底部导航栏处理
            if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                document.body.style.height = '100dvh';
                // 防止iOS橡皮筋效果导致的白边
                document.addEventListener('touchmove', (e) => {
                    if (e.target === document.body) {
                        e.preventDefault();
                    }
                }, { passive: false });
            }
        }

        // 添加 Agent 工作日志
        function addAgentLog(agentId, text, type = 'message') {
            if (!agentLogs.has(agentId)) {
                agentLogs.set(agentId, []);
            }
            const logs = agentLogs.get(agentId);
            logs.push({
                timestamp: Date.now(),
                text: text,
                type: type
            });
            // 只保留最近 50 条
            if (logs.length > MAX_LOGS_PER_AGENT) {
                logs.shift();
            }
            // 更新 Agent 列表显示
            updateAgentLogDisplay(agentId);
        }

        // 更新 Agent 日志显示
        function updateAgentLogDisplay(agentId) {
            const agentItem = document.querySelector(`.agent-item[data-agent-id="${agentId}"]`);
            if (!agentItem) return;

            const logs = agentLogs.get(agentId) || [];
            const latestLog = logs[logs.length - 1];
            const isExpanded = expandedAgents.has(agentId);

            // 更新最近日志预览
            const previewEl = agentItem.querySelector('.agent-log-preview');
            if (previewEl && latestLog) {
                const timeStr = new Date(latestLog.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                previewEl.textContent = `${timeStr} ${latestLog.text.substring(0, 30)}${latestLog.text.length > 30 ? '...' : ''}`;
                previewEl.style.display = 'block';
            }

            // 更新日志列表
            const logListEl = agentItem.querySelector('.agent-log-list');
            if (logListEl) {
                if (isExpanded && logs.length > 0) {
                    logListEl.innerHTML = logs.slice().reverse().map(log => {
                        const timeStr = new Date(log.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        const typeIcon = log.type === 'error' ? '❌' : log.type === 'success' ? '✅' : '📝';
                        return `<div class="agent-log-item ${log.type}">
                            <span class="log-time">${timeStr}</span>
                            <span class="log-icon">${typeIcon}</span>
                            <span class="log-text">${escapeHtml(log.text.substring(0, 100))}${log.text.length > 100 ? '...' : ''}</span>
                        </div>`;
                    }).join('');
                    logListEl.style.display = 'block';
                } else {
                    logListEl.style.display = 'none';
                }
            }

            // 更新展开按钮
            const expandBtn = agentItem.querySelector('.agent-expand-btn');
            if (expandBtn) {
                expandBtn.textContent = isExpanded ? '▼' : '▶';
                expandBtn.title = isExpanded ? '折叠' : '展开';
            }
        }

        // 切换 Agent 展开/折叠状态
        function toggleAgentExpand(agentId, event) {
            event.stopPropagation();
            if (expandedAgents.has(agentId)) {
                expandedAgents.delete(agentId);
            } else {
                expandedAgents.add(agentId);
            }
            updateAgentLogDisplay(agentId);
        }

                                    <span class="log-icon">${typeIcon}</span>

            container.innerHTML = '';

                const btn = document.createElement('button');
                btn.className = 'filter-btn';

                btn.onclick = () => toggleAgentFilter(agent.name);
