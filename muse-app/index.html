<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Muse App - 智能任务管理与协作平台">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="color-scheme" content="dark light">
  
  <title>Muse App</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
  
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/themes/dark.css">
  <link rel="stylesheet" href="./css/themes/light.css">
  
  <style>
    .app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-primary);
      z-index: 9999;
      transition: opacity var(--transition-normal) var(--easing-default);
    }
    
    .app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .app-loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .app-loading-text {
      margin-top: var(--spacing-md);
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app-loading" id="appLoading">
    <div class="app-loading-spinner"></div>
    <p class="app-loading-text">正在加载...</p>
  </div>
  
  <div class="app" id="app">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg class="sidebar-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
            <span class="sidebar-label">Muse</span>
          </div>
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="切换侧边栏">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
          </button>
        </div>
        
        <div class="sidebar-content">
          <nav class="sidebar-nav">
            <a href="#/dashboard" class="sidebar-nav-item active" data-route="dashboard">
              <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
              </svg>
              <span class="sidebar-label">仪表盘</span>
            </a>
            <a href="#/tasks" class="sidebar-nav-item" data-route="tasks">
              <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
              </svg>
              <span class="sidebar-label">任务</span>
            </a>
            <a href="#/memory" class="sidebar-nav-item" data-route="memory">
              <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 1010 10A10 10 0 0012 2z"/>
                <path d="M12 6v6l4 2"/>
              </svg>
              <span class="sidebar-label">记忆</span>
            </a>
            <a href="#/events" class="sidebar-nav-item" data-route="events">
              <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span class="sidebar-label">事件</span>
            </a>
          </nav>
          
          <div class="sidebar-section">
            <div class="sidebar-section-title sidebar-label">快捷操作</div>
            <nav class="sidebar-nav">
              <a href="#/settings" class="sidebar-nav-item" data-route="settings">
                <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
                <span class="sidebar-label">设置</span>
              </a>
            </nav>
          </div>
        </div>
        
        <div class="sidebar-footer">
          <div class="user-profile">
            <div class="avatar avatar-sm">
              <span>U</span>
            </div>
            <div class="sidebar-label">
              <div class="user-name">用户</div>
              <div class="user-role text-tertiary">管理员</div>
            </div>
          </div>
        </div>
      </aside>
      
      <main class="main-content">
        <header class="header">
          <div class="header-left">
            <button class="btn btn-icon btn-ghost" id="menuToggle" aria-label="菜单">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
              </svg>
            </button>
            <h1 class="header-title" id="pageTitle">仪表盘</h1>
          </div>
          
          <div class="header-center">
            <div class="search-box">
              <svg class="search-box-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
              <input type="search" placeholder="搜索..." aria-label="搜索">
            </div>
          </div>
          
          <div class="header-right">
            <button class="btn btn-icon btn-ghost" id="themeToggle" aria-label="切换主题">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
              </svg>
            </button>
            <button class="btn btn-icon btn-ghost" aria-label="通知">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 01-3.46 0"/>
              </svg>
            </button>
          </div>
        </header>
        
        <div class="content" id="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">欢迎回来</h2>
              <p class="content-subtitle">这是您的 Muse 工作空间</p>
            </div>
            <button class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              新建任务
            </button>
          </div>
          
          <div class="grid grid-auto-fit">
            <div class="card card-glass animate-fadeInUp">
              <div class="card-body">
                <div class="flex items-center gap-md">
                  <div class="avatar avatar-lg" style="background-color: var(--accent-primary);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M9 11l3 3L22 4"/>
                      <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                    </svg>
                  </div>
                  <div>
                    <h3 class="text-primary">12</h3>
                    <p class="text-secondary text-sm">待完成任务</p>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="card card-glass animate-fadeInUp animate-delay-100">
              <div class="card-body">
                <div class="flex items-center gap-md">
                  <div class="avatar avatar-lg" style="background-color: var(--accent-success);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </div>
                  <div>
                    <h3 class="text-primary">48</h3>
                    <p class="text-secondary text-sm">已完成任务</p>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="card card-glass animate-fadeInUp animate-delay-200">
              <div class="card-body">
                <div class="flex items-center gap-md">
                  <div class="avatar avatar-lg" style="background-color: var(--accent-warning);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <polyline points="12 6 12 12 16 14"/>
                    </svg>
                  </div>
                  <div>
                    <h3 class="text-primary">5</h3>
                    <p class="text-secondary text-sm">进行中</p>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="card card-glass animate-fadeInUp animate-delay-300">
              <div class="card-body">
                <div class="flex items-center gap-md">
                  <div class="avatar avatar-lg" style="background-color: var(--accent-danger);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <line x1="12" y1="8" x2="12" y2="12"/>
                      <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                  </div>
                  <div>
                    <h3 class="text-primary">3</h3>
                    <p class="text-secondary text-sm">高优先级</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="section">
            <div class="section-header">
              <h3 class="section-title">近期任务</h3>
              <a href="#/tasks" class="text-accent">查看全部</a>
            </div>
            <div class="card">
              <div class="card-body">
                <div class="empty-state">
                  <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                  </svg>
                  <h4 class="empty-state-title">暂无任务</h4>
                  <p class="empty-state-description">点击上方"新建任务"按钮创建您的第一个任务</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <footer class="footer">
          <p>&copy; 2024 Muse App. All rights reserved.</p>
        </footer>
      </main>
    </div>
  </div>
  
  <script type="module" src="./js/app.js"></script>
</body>
</html>
