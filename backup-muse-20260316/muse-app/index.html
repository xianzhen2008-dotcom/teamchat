<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Muse App - 智能任务与记忆管理</title>
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/themes/dark.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --priority-critical: #FF3D00;
      --priority-high: #FF6D00;
      --priority-medium: #FFAB00;
      --priority-low: #00C853;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0D0D0D; color: #fff; }
    .sidebar { position: fixed !important; }
    .main-content { margin-left: 280px !important; }
    
    .app-loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0D0D0D; z-index: 9999; }
    .spinner { width: 48px; height: 48px; border: 3px solid #2D2D2D; border-top-color: #0A84FF; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .modal-overlay { position: fixed !important; inset: 0 !important; background: rgba(0,0,0,0.8) !important; display: flex !important; align-items: center !important; justify-content: center !important; z-index: 999999 !important; padding: 20px !important; }
    .modal { background: #1A1A1A; border: 1px solid #3D3D3D; border-radius: 12px; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #3D3D3D; }
    .modal-title { font-size: 18px; font-weight: 600; color: #fff; margin: 0; }
    .modal-close { background: none; border: none; color: #B3B3B3; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 20px; border-top: 1px solid #3D3D3D; }
    
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn-primary { background: #0A84FF; color: #fff; }
    .btn-primary:hover { background: #409CFF; }
    .btn-ghost { background: transparent; color: #B3B3B3; border: 1px solid #3D3D3D; }
    .btn-ghost:hover { background: #2D2D2D; color: #fff; }
    .btn-success { background: #00C853; color: #fff; }
    .btn-danger { background: #FF3D00; color: #fff; }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #B3B3B3; margin-bottom: 4px; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; background: #2D2D2D; border: 1px solid #3D3D3D; border-radius: 8px; color: #fff; font-size: 14px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: #0A84FF; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-textarea { min-height: 80px; resize: vertical; }
    
    .task-card { background: #2D2D2D; border-radius: 8px; border-left: 3px solid #FFAB00; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
    .task-card:hover { background: #3D3D3D; }
    .task-card.priority-critical { border-left-color: var(--priority-critical); }
    .task-card.priority-high { border-left-color: var(--priority-high); }
    .task-card.priority-medium { border-left-color: var(--priority-medium); }
    .task-card.priority-low { border-left-color: var(--priority-low); }
    .task-card-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px; gap: 12px; }
    .task-card-title { font-weight: 500; color: #fff; flex: 1; }
    .task-card-id { font-size: 12px; color: #808080; margin-bottom: 4px; }
    .task-card-body { padding: 0 12px 12px; }
    .task-card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 12px; color: #808080; }
    .task-card-meta-item { display: flex; align-items: center; gap: 4px; }
    .task-card-progress { margin-top: 8px; }
    .task-card-progress-bar { height: 4px; background: #3D3D3D; border-radius: 2px; overflow: hidden; }
    .task-card-progress-fill { height: 100%; background: #0A84FF; }
    .task-card-progress-text { font-size: 12px; color: #808080; margin-top: 4px; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; display: inline-block; }
    .badge-pending, .badge-scheduled { background: rgba(255, 171, 0, 0.2); color: #FFAB00; }
    .badge-in_progress { background: rgba(10, 132, 255, 0.2); color: #0A84FF; }
    .badge-completed { background: rgba(0, 200, 83, 0.2); color: #00C853; }
    .badge-cancelled { background: rgba(128, 128, 128, 0.2); color: #808080; }
    .badge-critical { background: rgba(255, 61, 0, 0.2); color: #FF3D00; }
    .badge-high { background: rgba(255, 109, 0, 0.2); color: #FF6D00; }
    .badge-medium { background: rgba(255, 171, 0, 0.2); color: #FFAB00; }
    .badge-low { background: rgba(0, 200, 83, 0.2); color: #00C853; }
    
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab { padding: 8px 16px; border-radius: 20px; background: #2D2D2D; color: #B3B3B3; border: none; cursor: pointer; font-size: 14px; }
    .filter-tab:hover { background: #3D3D3D; color: #fff; }
    .filter-tab.active { background: #0A84FF; color: #fff; }
    .filter-tab .count { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px; font-size: 12px; margin-left: 6px; }
    
    .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
    .search-input { flex: 1; padding: 10px 16px; background: #2D2D2D; border: 1px solid #3D3D3D; border-radius: 8px; color: #fff; font-size: 14px; }
    .search-input:focus { outline: none; border-color: #0A84FF; }
    .sort-select { padding: 10px 16px; background: #2D2D2D; border: 1px solid #3D3D3D; border-radius: 8px; color: #fff; font-size: 14px; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: #808080; }
    .empty-state-title { font-size: 18px; margin-bottom: 8px; color: #B3B3B3; }
    .empty-state-description { font-size: 14px; }
    
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .content-title { font-size: 24px; font-weight: 600; color: #fff; margin: 0; }
    .content-subtitle { font-size: 14px; color: #808080; margin: 4px 0 0 0; }
    
    .stat-card { background: #2D2D2D; border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; }
    .stat-card:hover { background: #3D3D3D; transform: translateY(-2px); }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .stat-value { font-size: 28px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 14px; color: #808080; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    
    .section { margin-top: 32px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title { font-size: 18px; font-weight: 600; color: #fff; }
    .text-accent { color: #0A84FF; text-decoration: none; }
    .text-accent:hover { text-decoration: underline; }
    
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: #3D3D3D; }
    .timeline-item { position: relative; padding: 12px 16px; background: #2D2D2D; border-radius: 8px; margin-bottom: 12px; }
    .timeline-item::before { content: ''; position: absolute; left: -18px; top: 16px; width: 10px; height: 10px; background: #0A84FF; border-radius: 50%; }
    .timeline-time { font-size: 12px; color: #808080; margin-bottom: 4px; }
    .timeline-content { color: #fff; font-size: 14px; }
    .timeline-agent { font-size: 12px; color: #0A84FF; margin-top: 4px; }
    
    .detail-row { display: flex; margin-bottom: 12px; }
    .detail-label { width: 100px; color: #808080; font-size: 14px; flex-shrink: 0; }
    .detail-value { color: #fff; font-size: 14px; flex: 1; }
    .detail-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #3D3D3D; }
    .detail-section-title { font-size: 14px; font-weight: 600; color: #B3B3B3; margin-bottom: 12px; }
    
    .subtask-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #2D2D2D; border-radius: 6px; margin-bottom: 8px; }
    .subtask-title { flex: 1; color: #fff; font-size: 14px; }
    
    .activity-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2D2D2D; }
    .activity-item:last-child { border-bottom: none; }
    .activity-time { width: 60px; font-size: 12px; color: #808080; flex-shrink: 0; }
    .activity-content { flex: 1; }
    .activity-action { color: #fff; font-size: 14px; }
    .activity-agent { font-size: 12px; color: #0A84FF; margin-top: 2px; }
    
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 4px 10px; background: #3D3D3D; border-radius: 12px; font-size: 12px; color: #B3B3B3; }
    
    .memory-card { background: #2D2D2D; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .memory-content { color: #fff; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
    .memory-meta { font-size: 12px; color: #808080; }
    
    .nav-active { background: rgba(10, 132, 255, 0.1); color: #0A84FF !important; }
  </style>
</head>
<body>
  <div class="app-loading" id="appLoading">
    <div class="spinner"></div>
    <p style="color: #B3B3B3; margin-top: 16px;">正在加载...</p>
  </div>
  
  <div class="app" id="app">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <svg class="sidebar-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            <span class="sidebar-label">Muse</span>
          </div>
          <button class="sidebar-toggle" id="sidebarToggle" style="background:none;border:none;color:#B3B3B3;font-size:20px;cursor:pointer;">☰</button>
        </div>
        <div class="sidebar-content">
          <nav class="sidebar-nav">
            <a href="#/dashboard" class="sidebar-nav-item" data-route="dashboard" style="display:flex;align-items:center;gap:12px;padding:10px 12px;color:#B3B3B3;border-radius:8px;text-decoration:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              <span class="sidebar-label">仪表盘</span>
            </a>
            <a href="#/tasks" class="sidebar-nav-item" data-route="tasks" style="display:flex;align-items:center;gap:12px;padding:10px 12px;color:#B3B3B3;border-radius:8px;text-decoration:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              <span class="sidebar-label">任务</span>
            </a>
            <a href="#/memory" class="sidebar-nav-item" data-route="memory" style="display:flex;align-items:center;gap:12px;padding:10px 12px;color:#B3B3B3;border-radius:8px;text-decoration:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              <span class="sidebar-label">记忆</span>
            </a>
            <a href="#/events" class="sidebar-nav-item" data-route="events" style="display:flex;align-items:center;gap:12px;padding:10px 12px;color:#B3B3B3;border-radius:8px;text-decoration:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
              <span class="sidebar-label">事件</span>
            </a>
          </nav>
          <div class="sidebar-section" style="margin-top:24px;padding-top:16px;border-top:1px solid #3D3D3D;">
            <div class="sidebar-section-title" style="font-size:12px;color:#808080;text-transform:uppercase;margin-bottom:8px;padding:0 12px;">设置</div>
            <nav class="sidebar-nav">
              <a href="#/settings" class="sidebar-nav-item" data-route="settings" style="display:flex;align-items:center;gap:12px;padding:10px 12px;color:#B3B3B3;border-radius:8px;text-decoration:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
                <span class="sidebar-label">设置</span>
              </a>
            </nav>
          </div>
        </div>
      </aside>
      
      <main class="main-content">
        <header class="header" style="display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 24px;background:rgba(26,26,26,0.8);backdrop-filter:blur(16px);border-bottom:1px solid #3D3D3D;position:sticky;top:0;z-index:50;">
          <div class="header-left" style="display:flex;align-items:center;gap:12px;">
            <button id="menuToggle" style="padding:8px;background:transparent;border:1px solid #3D3D3D;border-radius:8px;color:#B3B3B3;cursor:pointer;">☰</button>
            <h1 class="header-title" id="pageTitle" style="font-size:18px;font-weight:600;color:#fff;margin:0;">仪表盘</h1>
          </div>
          <div class="header-right" style="display:flex;align-items:center;gap:8px;">
            <button id="themeToggle" style="padding:8px;background:transparent;border:1px solid #3D3D3D;border-radius:8px;color:#B3B3B3;cursor:pointer;">🌙</button>
          </div>
        </header>
        
        <div class="content" id="content" style="flex:1;padding:24px;"></div>
        
        <footer class="footer" style="display:flex;align-items:center;justify-content:center;height:48px;padding:0 24px;background:#1A1A1A;border-top:1px solid #3D3D3D;color:#808080;font-size:14px;">
          <p>&copy; 2024 Muse App. All rights reserved.</p>
        </footer>
      </main>
    </div>
  </div>

  <script>
const API_BASE = 'http://localhost:18788';
let appData = { tasks: [], memories: [], sessions: [] };
let currentSort = 'created';
let currentOrder = 'desc';

function hideLoading() {
  const loading = document.getElementById('appLoading');
  if (loading) { loading.style.display = 'none'; }
}

async function loadData() {
  try {
    const tasksRes = await fetch(API_BASE + '/api/muse/tasks');
    const tasksData = tasksRes.ok ? await tasksRes.json() : { tasks: [] };
    appData.tasks = tasksData.tasks || [];
  } catch (e) {
    console.error('Load data error:', e);
  } finally {
    hideLoading();
  }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr);
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function formatDateTime(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr);
  return date.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function getStatusText(status) {
  const texts = { pending: '待处理', in_progress: '进行中', completed: '已完成', cancelled: '已取消', scheduled: '已安排' };
  return texts[status] || status;
}

function getStatusCounts() {
  const tasks = appData.tasks;
  return {
    all: tasks.length,
    pending: tasks.filter(t => ['pending', 'in_progress', 'scheduled'].includes(t.status)).length,
    completed: tasks.filter(t => t.status === 'completed').length,
    cancelled: tasks.filter(t => t.status === 'cancelled').length
  };
}

function getSubtaskProgress(task) {
  if (!task.subtasks || task.subtasks.length === 0) return null;
  const completed = task.subtasks.filter(st => st.status === 'completed').length;
  return { completed, total: task.subtasks.length, percent: Math.round((completed / task.subtasks.length) * 100) };
}

function showToast(message) {
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:12px 24px;background:#1A1A1A;border:1px solid #3D3D3D;border-radius:8px;color:#fff;z-index:9999999;';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function navigateTo(route) {
  window.location.hash = route;
}

function handleRoute() {
  const hash = window.location.hash || '#/dashboard';
  const route = hash.split('?')[0].replace('#', '') || '/dashboard';
  
  document.querySelectorAll('.sidebar-nav-item').forEach(item => {
    item.classList.remove('nav-active');
    if (item.getAttribute('href') === hash) {
      item.classList.add('nav-active');
    }
  });
  
  const titles = { '/dashboard': '仪表盘', '/tasks': '任务管理', '/memory': '记忆库', '/events': '事件日志', '/settings': '设置' };
  document.getElementById('pageTitle').textContent = titles[route] || '仪表盘';
  
  switch (route) {
    case '/dashboard': renderDashboard(); break;
    case '/tasks': renderTasks(); break;
    case '/memory': renderMemory(); break;
    case '/events': renderEvents(); break;
    case '/settings': renderSettings(); break;
    default: renderDashboard();
  }
}

function renderDashboard() {
  const counts = getStatusCounts();
  const pendingTasks = appData.tasks.filter(t => ['pending', 'in_progress', 'scheduled'].includes(t.status)).slice(0, 5);
  
  document.getElementById('content').innerHTML = `
    <div class="content-header">
      <div>
        <h2 class="content-title">欢迎回来</h2>
        <p class="content-subtitle">这是您的 Muse 工作空间</p>
      </div>
      <button class="btn btn-primary" id="createBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建任务
      </button>
    </div>
    
    <div class="stat-grid">
      <div class="stat-card" onclick="navigateTo('#/tasks?status=pending')">
        <div class="stat-icon" style="background: rgba(10, 132, 255, 0.2);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0A84FF" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <div>
          <div class="stat-value">${counts.pending}</div>
          <div class="stat-label">待完成任务</div>
        </div>
      </div>
      
      <div class="stat-card" onclick="navigateTo('#/tasks?status=completed')">
        <div class="stat-icon" style="background: rgba(0, 200, 83, 0.2);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00C853" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <div class="stat-value">${counts.completed}</div>
          <div class="stat-label">已完成任务</div>
        </div>
      </div>
      
      <div class="stat-card" onclick="navigateTo('#/memory')">
        <div class="stat-icon" style="background: rgba(255, 171, 0, 0.2);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFAB00" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div>
          <div class="stat-value">*</div>
          <div class="stat-label">记忆条数</div>
        </div>
      </div>
      
      <div class="stat-card" onclick="navigateTo('#/events')">
        <div class="stat-icon" style="background: rgba(255, 61, 0, 0.2);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF3D00" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
        </div>
        <div>
          <div class="stat-value">-</div>
          <div class="stat-label">事件记录</div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-header">
        <h3 class="section-title">近期任务</h3>
        <a href="#/tasks" class="text-accent">查看全部</a>
      </div>
      ${pendingTasks.length > 0 ? pendingTasks.map(t => {
        const progress = getSubtaskProgress(t);
        return `
          <div class="task-card priority-${t.priority || 'medium'}" onclick="showTaskDetail('${t.id}')">
            <div class="task-card-header">
              <div>
                <div class="task-card-id">${t.id}</div>
                <div class="task-card-title">${escapeHtml(t.title)}</div>
              </div>
              <span class="badge badge-${t.status}">${getStatusText(t.status)}</span>
            </div>
            <div class="task-card-body">
              ${progress ? `
                <div class="task-card-progress">
                  <div class="task-card-progress-bar"><div class="task-card-progress-fill" style="width: ${progress.percent}%"></div></div>
                  <div class="task-card-progress-text">子任务: ${progress.completed}/${progress.total} (${progress.percent}%)</div>
                </div>
              ` : ''}
              <div class="task-card-meta">
                ${t.assignee ? `<span class="task-card-meta-item">👤 ${escapeHtml(t.assignee)}</span>` : ''}
                <span class="task-card-meta-item">🕐 ${formatDate(t.created)}</span>
                ${t.deadline ? `<span class="task-card-meta-item">📅 ${formatDate(t.deadline)}</span>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('') : `
        <div class="empty-state">
          <div class="empty-state-title">暂无待办任务</div>
          <div class="empty-state-description">点击"新建任务"按钮创建任务</div>
        </div>
      `}
    </div>
  `;
  
  document.getElementById('createBtn').addEventListener('click', showCreateTaskModal);
}

function renderTasks() {
  const urlParams = new URLSearchParams(window.location.hash.split('?')[1] || '');
  const statusFilter = urlParams.get('status');
  const searchQuery = urlParams.get('q') || '';
  
  let filteredTasks = [...appData.tasks];
  
  if (statusFilter === 'pending') {
    filteredTasks = filteredTasks.filter(t => ['pending', 'in_progress', 'scheduled'].includes(t.status));
  } else if (statusFilter === 'completed') {
    filteredTasks = filteredTasks.filter(t => t.status === 'completed');
  } else if (statusFilter === 'cancelled') {
    filteredTasks = filteredTasks.filter(t => t.status === 'cancelled');
  }
  
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filteredTasks = filteredTasks.filter(t => t.title.toLowerCase().includes(q));
  }
  
  filteredTasks.sort((a, b) => {
    let valA, valB;
    if (currentSort === 'created') {
      valA = new Date(a.created).getTime();
      valB = new Date(b.created).getTime();
    } else if (currentSort === 'priority') {
      const pMap = { critical: 4, high: 3, medium: 2, low: 1 };
      valA = pMap[a.priority] || 0;
      valB = pMap[b.priority] || 0;
    } else {
      valA = new Date(a.updated).getTime();
      valB = new Date(b.updated).getTime();
    }
    return currentOrder === 'desc' ? valB - valA : valA - valB;
  });
  
  const counts = getStatusCounts();
  
  document.getElementById('content').innerHTML = `
    <div class="content-header">
      <div>
        <h2 class="content-title">任务管理</h2>
        <p class="content-subtitle">共 ${filteredTasks.length} 个任务</p>
      </div>
      <button class="btn btn-primary" id="createBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建任务
      </button>
    </div>
    
    <div class="filter-tabs">
      <button class="filter-tab ${!statusFilter ? 'active' : ''}" onclick="navigateTo('#/tasks')">全部 <span class="count">${counts.all}</span></button>
      <button class="filter-tab ${statusFilter === 'pending' ? 'active' : ''}" onclick="navigateTo('#/tasks?status=pending')">待处理 <span class="count">${counts.pending}</span></button>
      <button class="filter-tab ${statusFilter === 'completed' ? 'active' : ''}" onclick="navigateTo('#/tasks?status=completed')">已完成 <span class="count">${counts.completed}</span></button>
      <button class="filter-tab ${statusFilter === 'cancelled' ? 'active' : ''}" onclick="navigateTo('#/tasks?status=cancelled')">已取消 <span class="count">${counts.cancelled}</span></button>
    </div>
    
    <div class="search-box">
      <input type="text" class="search-input" placeholder="搜索任务..." value="${escapeHtml(searchQuery)}" id="searchInput">
      <select class="sort-select" id="sortSelect">
        <option value="created-desc">最新创建</option>
        <option value="priority-desc">优先级高→低</option>
        <option value="updated-desc">最近更新</option>
      </select>
    </div>
    
    ${filteredTasks.length > 0 ? filteredTasks.map(t => {
      const progress = getSubtaskProgress(t);
      return `
        <div class="task-card priority-${t.priority || 'medium'}" onclick="showTaskDetail('${t.id}')">
          <div class="task-card-header">
            <div>
              <div class="task-card-id">${t.id}</div>
              <div class="task-card-title">${escapeHtml(t.title)}</div>
            </div>
            <span class="badge badge-${t.status}">${getStatusText(t.status)}</span>
          </div>
          <div class="task-card-body">
            ${t.tags && t.tags.length > 0 ? `<div class="tags">${t.tags.filter(t => t).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
            ${progress ? `
              <div class="task-card-progress">
                <div class="task-card-progress-bar"><div class="task-card-progress-fill" style="width: ${progress.percent}%"></div></div>
                <div class="task-card-progress-text">子任务: ${progress.completed}/${progress.total}</div>
              </div>
            ` : ''}
            <div class="task-card-meta">
              ${t.assignee ? `<span class="task-card-meta-item">👤 ${escapeHtml(t.assignee)}</span>` : ''}
              <span class="task-card-meta-item">🕐 ${formatDate(t.created)}</span>
              ${t.deadline ? `<span class="task-card-meta-item">📅 ${formatDate(t.deadline)}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('') : `
      <div class="empty-state">
        <div class="empty-state-title">暂无任务</div>
        <div class="empty-state-description">点击"新建任务"按钮创建任务</div>
      </div>
    `}
  `;
  
  document.getElementById('createBtn').addEventListener('click', showCreateTaskModal);
  
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      navigateTo(q ? '#/tasks?q=' + encodeURIComponent(q) : '#/tasks');
    }
  });
  
  document.getElementById('sortSelect').addEventListener('change', (e) => {
    const [sort, order] = e.target.value.split('-');
    currentSort = sort || 'created';
    currentOrder = order || 'desc';
    renderTasks();
  });
}

function renderEvents() {
  document.getElementById('content').innerHTML = `
    <div class="content-header">
      <div>
        <h2 class="content-title">事件日志</h2>
        <p class="content-subtitle">Agent 会话历史</p>
      </div>
    </div>
    
    <div class="empty-state">
      <div class="empty-state-title">加载中...</div>
    </div>
  `;
  
  fetch(API_BASE + '/api/muse/session-history?agent_id=main')
    .then(res => res.json())
    .then(data => {
      const context = data.context || [];
      if (context.length > 0) {
        document.getElementById('content').innerHTML = `
          <div class="content-header">
            <div>
              <h2 class="content-title">事件日志</h2>
              <p class="content-subtitle">共 ${context.length} 条记录</p>
            </div>
          </div>
          
          <div class="timeline">
            ${context.slice(0, 20).map(item => {
              let time = '';
              let content = item;
              if (typeof item === 'string' && item.startsWith('[')) {
                const match = item.match(/^\[(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})\]\s*(.*)$/);
                if (match) {
                  time = match[1];
                  content = match[2];
                }
              }
              return `
                <div class="timeline-item">
                  <div class="timeline-time">${time || '-'}</div>
                  <div class="timeline-content">${escapeHtml(content)}</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      } else {
        document.getElementById('content').innerHTML = `
          <div class="content-header">
            <div>
              <h2 class="content-title">事件日志</h2>
              <p class="content-subtitle">共 0 条记录</p>
            </div>
          </div>
          
          <div class="empty-state">
            <div class="empty-state-title">暂无事件</div>
            <div class="empty-state-description">会话历史将自动记录</div>
          </div>
        `;
      }
    })
    .catch(() => {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-title">无法加载事件</div>
          <div class="empty-state-description">请检查服务连接</div>
        </div>
      `;
    });
}

      <div class="task-card" style="cursor: default; margin-top: 12px;">

          <div class="task-card-meta">

function showCreateTaskModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">新建任务</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">任务标题 *</label>
          <input type="text" class="form-input" id="taskTitle" placeholder="输入任务标题" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">优先级</label>
            <select class="form-select" id="taskPriority">
              <option value="low">低</option>
              <option value="medium" selected>中</option>
              <option value="high">高</option>
              <option value="critical">紧急</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">复杂度</label>
            <select class="form-select" id="taskComplexity">
              <option value="1">1 - 简单</option>
              <option value="2" selected>2 - 一般</option>
              <option value="3">3 - 中等</option>
              <option value="4">4 - 复杂</option>
              <option value="5">5 - 困难</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">负责人</label>
            <input type="text" class="form-input" id="taskAssignee" placeholder="分配给...">
          </div>
          <div class="form-group">
            <label class="form-label">截止日期</label>
            <input type="date" class="form-input" id="taskDeadline">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">需求背景</label>
          <textarea class="form-input form-textarea" id="taskBackground" placeholder="描述任务背景..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" id="submitTask">创建</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  
  modal.querySelector('#submitTask').addEventListener('click', async () => {
    const title = modal.querySelector('#taskTitle').value.trim();
    if (!title) { showToast('请输入任务标题'); return; }
    
    try {
      const res = await fetch(API_BASE + '/api/muse/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          priority: modal.querySelector('#taskPriority').value,
          complexity: parseInt(modal.querySelector('#taskComplexity').value),
          assignee: modal.querySelector('#taskAssignee').value,
          deadline: modal.querySelector('#taskDeadline').value,
          background: modal.querySelector('#taskBackground').value,
          status: 'pending'
        })
      });
      
      if (res.ok) {
        showToast('任务创建成功');
        modal.remove();
        await loadData();
        handleRoute();
      } else {
        showToast('创建失败');
      }
    } catch (e) {
      showToast('网络错误');
    }
  });
}

function showTaskDetail(taskId) {
  const task = appData.tasks.find(t => t.id === taskId);
  if (!task) { showToast('任务不存在'); return; }
  
  const progress = getSubtaskProgress(task);
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" style="max-width: 700px;">
      <div class="modal-header">
        <h3 class="modal-title">${task.id}: ${escapeHtml(task.title)}</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      </div>
      <div class="modal-body">
        <div class="detail-row">
          <span class="detail-label">状态</span>
          <span class="detail-value"><span class="badge badge-${task.status}">${getStatusText(task.status)}</span></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">优先级</span>
          <span class="detail-value"><span class="badge badge-${task.priority}">${task.priority === 'critical' ? '紧急' : task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'}</span></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">复杂度</span>
          <span class="detail-value">${task.complexity || '-'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">负责人</span>
          <span class="detail-value">${escapeHtml(task.assignee || '-')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">截止日期</span>
          <span class="detail-value">${task.deadline ? formatDate(task.deadline) : '-'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">创建时间</span>
          <span class="detail-value">${formatDateTime(task.created)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">更新时间</span>
          <span class="detail-value">${formatDateTime(task.updated)}</span>
        </div>
        
        ${task.background ? `
          <div class="detail-section">
            <div class="detail-section-title">需求背景</div>
            <p style="color: #fff; font-size: 14px; line-height: 1.6;">${escapeHtml(task.background)}</p>
          </div>
        ` : ''}
        
        ${task.tags && task.tags.length > 0 ? `
          <div class="detail-section">
            <div class="detail-section-title">标签</div>
            <div class="tags">${task.tags.filter(t => t).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>
          </div>
        ` : ''}
        
        ${task.subtasks && task.subtasks.length > 0 ? `
          <div class="detail-section">
            <div class="detail-section-title">子任务 (${task.subtasks.filter(st => st.status === 'completed').length}/${task.subtasks.length})</div>
            ${task.subtasks.map(st => `
              <div class="subtask-item">
                <span>${st.status === 'completed' ? '☑' : '☐'}</span>
                <span class="subtask-title">${escapeHtml(st.title)}</span>
                <span class="badge badge-${st.status === 'completed' ? 'completed' : 'pending'}">${st.status === 'completed' ? '完成' : '待处理'}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
        
        ${task.activities && task.activities.length > 0 ? `
          <div class="detail-section">
            <div class="detail-section-title">活动记录</div>
            ${task.activities.slice().reverse().map(act => `
              <div class="activity-item">
                <span class="activity-time">${formatDateTime(act.timestamp)}</span>
                <div class="activity-content">
                  <div class="activity-action">${escapeHtml(act.action)}: ${escapeHtml(act.details || '')}</div>
                  <div class="activity-agent">by ${escapeHtml(act.agent || '系统')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
      <div class="modal-footer">
        ${task.status !== 'completed' ? `<button class="btn btn-success" onclick="updateTaskStatus('${task.id}', 'completed')">完成</button>` : ''}
        ${task.status !== 'cancelled' ? `<button class="btn btn-danger" onclick="updateTaskStatus('${task.id}', 'cancelled')">取消</button>` : ''}
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">关闭</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
}

async function updateTaskStatus(taskId, status) {
  try {
    const res = await fetch(API_BASE + '/api/muse/tasks/' + taskId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    
    if (res.ok) {
      showToast('状态已更新');
      await loadData();
      handleRoute();
      document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
    } else {
      showToast('更新失败');
    }
  } catch (e) {
    showToast('网络错误');
  }
}

function bindEvents() {
  document.getElementById('themeToggle').addEventListener('click', () => {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('muse-theme', next);
    showToast('主题已切换');
  });
  
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });
  
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });
  
  window.addEventListener('hashchange', handleRoute);
}

async function init() {
  bindEvents();
  await loadData();
  handleRoute();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
  </script>
